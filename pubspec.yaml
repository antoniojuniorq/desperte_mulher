name: desperte_mulher
description: Plataforma de análise de risco para vítimas de violência doméstica.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Navegação
  go_router: ^17.3.0

  # Gerenciamento de estado
  flutter_riverpod: ^3.3.2

  # HTTP / Backend
  dio: ^5.4.0

  # Armazenamento local
  shared_preferences: ^2.2.2

  # UI / Componentes visuais
  google_fonts: ^8.1.0
  flutter_animate: ^4.5.0
  fl_chart: ^1.2.0

  # Formulários
  flutter_form_builder: ^10.3.0+2
  form_builder_validators: ^11.3.0

  # Ícones
  font_awesome_flutter: ^11.0.0

  # Utilitários
  equatable: ^2.0.5
  dartz: ^0.10.1
  logger: ^2.1.0
  url_launcher: ^6.2.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
